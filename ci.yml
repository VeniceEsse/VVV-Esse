import { describe, it, expect, beforeEach } from 'vitest'
import { ESSE } from '../src/core/esse'
import { ResearchAgent } from '../src/agents/research-agent'
import { WriterAgent } from '../src/agents/writer-agent'
import { CriticAgent } from '../src/agents/critic-agent'
import { CoderAgent } from '../src/agents/coder-agent'
import { PlannerAgent } from '../src/agents/planner-agent'

describe('ESSE core', () => {
  let esse: ESSE

  beforeEach(() => {
    esse = new ESSE({ mode: 'capability-assimilation', debug: false })
  })

  it('initializes with default config', () => {
    expect(esse).toBeDefined()
    expect(esse.getSession()).toBeNull()
  })

  it('throws if fusing less than 2 agents', async () => {
    await expect(esse.fuse([new ResearchAgent()])).rejects.toThrow(
      'at least 2 agents'
    )
  })

  it('throws if fusing more than maxAgents', async () => {
    const esse2 = new ESSE({ maxAgents: 2 })
    await expect(
      esse2.fuse([new ResearchAgent(), new WriterAgent(), new CriticAgent()])
    ).rejects.toThrow('maxAgents')
  })

  it('fuses 2 agents and creates a session', async () => {
    const session = await esse.fuse([new ResearchAgent(), new WriterAgent()])
    expect(session).toBeDefined()
    expect(session.agents).toHaveLength(2)
    expect(session.status).toBe('active')
    expect(session.iqBoost).toBeGreaterThan(0)
  })

  it('executes a task after fusion', async () => {
    await esse.fuse([new ResearchAgent(), new WriterAgent()])
    const result = await esse.execute('Test task')
    expect(typeof result).toBe('string')
    expect(result.length).toBeGreaterThan(0)
  })

  it('throws if execute called before fuse', async () => {
    await expect(esse.execute('Test')).rejects.toThrow('No agents fused')
  })

  it('defuses and clears the session', async () => {
    await esse.fuse([new ResearchAgent(), new WriterAgent()])
    await esse.defuse()
    expect(esse.getSession()).toBeNull()
  })

  it('runs in perfect-convergence mode', async () => {
    const esse2 = new ESSE({ mode: 'perfect-convergence' })
    await esse2.fuse([new PlannerAgent(), new CoderAgent()])
    const result = await esse2.execute('Build something')
    expect(result).toBeDefined()
    await esse2.defuse()
  })

  it('runs in synchronization-link mode', async () => {
    const esse2 = new ESSE({ mode: 'synchronization-link' })
    await esse2.fuse([new ResearchAgent(), new WriterAgent()])
    const result = await esse2.execute('Brainstorm ideas')
    expect(result).toBeDefined()
    await esse2.defuse()
  })

  it('calculates IQ boost correctly', async () => {
    const session = await esse.fuse([
      new ResearchAgent(), new WriterAgent(), new CriticAgent()
    ])
    expect(session.iqBoost).toBe(45) // 3 * 15 * 1.0
  })
})
